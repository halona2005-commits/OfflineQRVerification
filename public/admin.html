<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | VeriScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell admin-shell">
    <aside class="sidebar admin-sidebar">
      <div class="brand-row">
        <div class="brand-mark">QR</div>
        <div>
          <h1>Admin</h1>
          <p>Management console</p>
        </div>
      </div>

      <div class="admin-nav" id="adminNav">
        <button class="btn ghost-btn" id="adminLogoutBtn">Logout</button>
      </div>
    </aside>

    <main class="main-grid admin-main">
      <section class="card admin-login-card" id="adminLoginPanel">
        <h2>Admin Login</h2>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="adminEmail" placeholder="admin@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="adminPassword" placeholder="Admin password" />
        </div>
        <button class="btn primary-btn" id="adminLoginBtn">Sign In</button>
        <div class="status-message" id="adminAuthMessage"></div>
      </section>

      <section class="card hidden" id="adminDashboardPanel">
        <div class="panel-header">
          <h2>Users Overview</h2>
          <p class="muted">Review registered users, download documents, and mark users as verified.</p>
        </div>
        <div id="adminUsersList" class="admin-users-grid"></div>
        <div class="card" id="qrVerificationCard">
          <h3>QR Verification</h3>
          <p class="muted">Scan QR codes and validate digital signatures (admin only).</p>
          <div class="scanner-actions">
            <button class="btn secondary-btn" id="adminStartScannerBtn">Start Scanner</button>
            <button class="btn ghost-btn hidden" id="adminStopScannerBtn">Stop Scanner</button>
          </div>
          <div class="scanner-card">
            <div id="adminReader"></div>
            <div class="status-panel" id="adminVerifyStatus">
              <p class="muted">Scanner inactive. Click Start Scanner to begin.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
